upstream service_a {
    server service-a:80;
}

upstream service_b {
    server service-b:80;
}

upstream auth_service {
    server auth-service:8080;
}

server {
    listen 80;

    # ---- Auth subrequest ----
    location = /_auth {
        internal;

        proxy_pass http://auth_service/auth/validate;

        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host "auth-service";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Target-Service $target_service;
    }

    # ---- 403 fallback ----
    location = /_forbidden {
        internal;
        return 403 '{"error":"Forbidden"}';
    }

    # ---------- Service A ----------
    location /a/ {
        if ($http_authorization = "") {
            return 403;
        }

        set $target_service "A";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;

        proxy_pass http://service_a/;
    }

    # ---------- Service B ----------
    location /b/ {
        if ($http_authorization = "") {
            return 403;
        }

        set $target_service "B";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;

        proxy_pass http://service_b/;
    }

    # ---------- Admin (public for now) ----------
    location /admin/ {
        proxy_pass http://auth_service/admin/;
        proxy_set_header Host "auth-service";
    }

    # ---------- Public auth routes (no NGINX auth) ----------
    location = /swagger-ui.html {
        proxy_pass http://auth_service/swagger-ui.html;
        proxy_set_header Host $host;
    }

    location /swagger-ui {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
    }

    location = /v3/api-docs {
        proxy_pass http://auth_service/v3/api-docs;
        proxy_set_header Host $host;
    }

    location /v3/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
    }

    location /register {
        proxy_pass http://auth_service/register;
        proxy_set_header Host $host;
    }

    location /verify {
        proxy_pass http://auth_service/verify;
        proxy_set_header Host $host;
    }

    location /auth/ {
        proxy_pass http://auth_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
}
